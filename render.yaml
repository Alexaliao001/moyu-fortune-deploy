services:
  - type: web
    name: moyu-fortune
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: "0.0.0.0"
      - key: MOYU_CORS_ORIGINS
        value: "https://chillworks.ai,https://www.chillworks.ai,http://localhost:3000"
